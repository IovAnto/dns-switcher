name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Build release
      run: cargo build --release --verbose
    
    - name: Create tarball
      run: |
        mkdir -p release
        cp target/release/dns-switcher release/
        cp README.md LICENSE release/
        cd release
        # Create both versioned and "latest" compatible names
        tar -czvf ../dns-switcher-${{ github.ref_name }}-x86_64-linux.tar.gz *
        cd ..
        cp dns-switcher-${{ github.ref_name }}-x86_64-linux.tar.gz dns-switcher-linux-x86_64.tar.gz
    
    - name: Generate SHA256
      run: |
        sha256sum dns-switcher-${{ github.ref_name }}-x86_64-linux.tar.gz > dns-switcher-${{ github.ref_name }}-x86_64-linux.tar.gz.sha256
        sha256sum dns-switcher-linux-x86_64.tar.gz > dns-switcher-linux-x86_64.tar.gz.sha256
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dns-switcher-${{ github.ref_name }}-x86_64-linux.tar.gz
          dns-switcher-${{ github.ref_name }}-x86_64-linux.tar.gz.sha256
          dns-switcher-linux-x86_64.tar.gz
          dns-switcher-linux-x86_64.tar.gz.sha256
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-aur:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Get version
      id: version
      run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
    
    - name: Download release tarball
      run: |
        wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/dns-switcher-${{ github.ref_name }}-x86_64-linux.tar.gz.sha256
        SHA256=$(cat dns-switcher-${{ github.ref_name }}-x86_64-linux.tar.gz.sha256 | cut -d' ' -f1)
        echo "sha256=$SHA256" >> $GITHUB_OUTPUT
      id: sha
    
    - name: Generate PKGBUILD
      run: |
        cat > PKGBUILD << 'EOF'
        # Maintainer: IovAnto <iovine.antonio44@gmail.com>
        pkgname=dns-switcher
        pkgver=${{ steps.version.outputs.version }}
        pkgrel=1
        pkgdesc="TUI application for real-time DNS switching on Linux"
        arch=('x86_64')
        url="https://github.com/IovAnto/dns-switcher"
        license=('MIT')
        depends=('networkmanager' 'polkit')
        makedepends=('rust' 'cargo')
        source=("$pkgname-$pkgver.tar.gz::https://github.com/IovAnto/dns-switcher/archive/refs/tags/v$pkgver.tar.gz")
        sha256sums=('SKIP')

        build() {
            cd "$pkgname-$pkgver"
            cargo build --release --locked
        }

        package() {
            cd "$pkgname-$pkgver"
            install -Dm755 "target/release/dns-switcher" "$pkgdir/usr/bin/dns-switcher"
            install -Dm644 "LICENSE" "$pkgdir/usr/share/licenses/$pkgname/LICENSE"
            install -Dm644 "README.md" "$pkgdir/usr/share/doc/$pkgname/README.md"
        }
        EOF
    
    - name: Generate .SRCINFO
      run: |
        cat > .SRCINFO << 'EOF'
        pkgbase = dns-switcher
        	pkgdesc = TUI application for real-time DNS switching on Linux
        	pkgver = ${{ steps.version.outputs.version }}
        	pkgrel = 1
        	url = https://github.com/IovAnto/dns-switcher
        	arch = x86_64
        	license = MIT
        	makedepends = rust
        	makedepends = cargo
        	depends = networkmanager
        	depends = polkit
        	source = dns-switcher-${{ steps.version.outputs.version }}.tar.gz::https://github.com/IovAnto/dns-switcher/archive/refs/tags/v${{ steps.version.outputs.version }}.tar.gz
        	sha256sums = SKIP

        pkgname = dns-switcher
        EOF
    
    - name: Upload AUR files
      uses: actions/upload-artifact@v4
      with:
        name: aur-package
        path: |
          PKGBUILD
          .SRCINFO
